upstream dgx_vllm_backend {
    # DGX1 (local)
    server 10.0.0.1:30000 max_fails=2 fail_timeout=10s weight=1;
    # DGX2
    server 10.0.0.2:30000 max_fails=2 fail_timeout=10s weight=1;
    # Session persistence for stateful requests (optional)
    # ip_hash;
}

server {
    listen 80;
    server_name _;

    # Health check endpoint
    location /health {
        proxy_pass http://dgx_vllm_backend;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Main API endpoint
    location / {
        proxy_pass http://dgx_vllm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Retry on failure (will try next upstream)
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 30s;
    }

    # Access and error logs
    access_log /var/log/nginx/dgx_vllm_access.log;
    error_log /var/log/nginx/dgx_vllm_error.log;
}
