version: '3.8'

services:
  chat:
    build:
      context: ./chat
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1

    image: dgx-spark-chat:latest
    container_name: dgx-spark-chat

    # Network mode: host allows access to localhost:8355 (TRT-LLM API)
    network_mode: host

    # Environment variables
    environment:
      # TRT-LLM API endpoint (default localhost, can be overridden)
      - TRT_LLM_API=http://localhost:8355/v1
      - PYTHONUNBUFFERED=1

    # Restart policy
    restart: unless-stopped

    # Resource limits (optional, adjust based on system)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Labels for easypanel/portainer discovery
    labels:
      app: "dgx-spark-chat"
      version: "1.0"
      description: "Grok-style Chat UI for TensorRT-LLM"
